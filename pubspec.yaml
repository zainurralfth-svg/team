name: puddingku_smart_system
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # --- VERSI YANG COCOK BUAT SDK KAMU ---
  awesome_dialog: ^3.3.0
  http: ^1.6.0

  # --- Library Firebase ---
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

  # --- Tambahan untuk ambil foto dari galeri ---
  image_picker: ^1.0.4
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # --- Alat Tukang Ganti Logo Aplikasi ---
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  
  # --- PENGATURAN FONT APLIKASI ---
  fonts:
    - family: Signika Negative
      fonts:
        - asset: assets/fonts/SignikaNegative-Regular.ttf
        - asset: assets/fonts/SignikaNegative-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SignikaNegative-Bold.ttf
          weight: 700

    - family: Oleo Script
      fonts:
        - asset: assets/fonts/OleoScript-Regular.ttf
        - asset: assets/fonts/OleoScript-Bold.ttf
          weight: 700

# --- PENGATURAN LOGO PUDDINGKU ---
# Pastikan nama file gambar kamu adalah "logo puddingku fiks.jpeg"
# dan sudah ditaruh di dalam folder "assets/images/"
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo puddingku.png"

  # --- NAH INI YANG KELUPAAN (BIAR GAK ADA KOTAK PUTIH) ---
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/images/logo puddingku.png"